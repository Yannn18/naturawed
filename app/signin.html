<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In NaturaWed</title>
    <link rel="stylesheet" href="editing.css" />
  </head>

  <body>
    <main class="container">
      <!-- LEFT SIDE -->
      <div class="left">
        <!-- Logo Image -- -->
        <img src="/image/logo.svg" alt="logo" class="logo" />
        <h1>Naturawed</h1>
      </div>
      <!-- RIGHT SIDE -->
      <div class="right">
        <div class="form-box">
          <div class="form-header">
            <h2>Create Account</h2>
            <p>Let's get started with a new account.</p>
          </div>

          <form id="SignIn">
            <div class="input-box">
              <input
                type="email"
                name="email"
                id="email"
                placeholder="Email"
                required
              />
            </div>

            <div class="input-box password-box">
              <input
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required
              />
              <span class="eye-icon">👁️</span>
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
          </form>
          <div class="login-link">
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
          </div>
        </div>
      </div>
    </main>
    <script>
      document
        .getElementById("SignIn")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();

          //buat cek tidak boleh kosong
          if (email === "" || password === "") {
            alert("Email dan Password wajib diisi!");
            return;
          }

          //validasi format email
          const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
          if (!emailPattern.test(email)) {
            alert("Format email tidak valid.");
            return;
          }

          //buat cek password minimal 6 karakter
          if (password.length < 6) {
            alert("Password minimal 6 karakter.");
            return;
          }

          // Simulate successful sign-in
          alert("Login berhasil!");
          this.reset();
        });
    </script>
  </body>
</html>
