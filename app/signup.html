<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Naturawed</title>
    <link rel="stylesheet" href="editing.css" />
  </head>

  <body>
    <main class="container">
      <!-- LEFT SIDE -->
      <div class="left">
        <!-- Logo Image -- -->
        <img src="/image/logo.svg" alt="logo" class="logo" />
        <h1>Naturawed</h1>
      </div>
      <!-- RIGHT SIDE -->
      <div class="right">
        <div class="form-box">
          <div class="form-header">
            <h2>Create Account</h2>
            <p>Let's get started with a new account.</p>
          </div>

          <form id="SignUp">
            <div class="input-box">
              <input
                type="text"
                name="username"
                id="username"
                placeholder="User Name"
                required
              />
            </div>

            <div class="input-box">
              <input
                type="email"
                name="email"
                id="email"
                placeholder="Email"
                required
              />
            </div>

            <div class="input-box password-box">
              <input
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required
              />
              <span class="eye-icon">👁️</span>
            </div>

            <div class="input-box password-box">
              <input
                type="password"
                name="confirmpassword"
                id="confirmpassword"
                placeholder="Confirm Password"
                required
              />
              <span class="eye-icon">👁️</span>
            </div>

            <button type="submit" class="btn-submit">Sign Up</button>
          </form>
          <div class="login-link">
            <p>Already have an account? <a href="signin.html">Log in</a></p>
          </div>
        </div>
      </div>
    </main>

    <script>
      //username validation
      function validasiNama() {
        let inputNama = document.getElementById("username").value;
        let pola = /^[a-zA-Z' ]+$/;

        if (!pola.test(inputNama)) {
          alert("Nama hanya boleh mengandung huruf dan tanda petik satu (')");
          return false;
        }
        return true;
      }

      //password validation (masih belum)
      function validasiPassword() {
        const inputPassword = document.getElementById("password").value;
        const inputConfirmPassword =
          document.getElementById("confirmpassword").value;

        if (!inputPassword || !inputConfirmPassword) {
          alert("Password dan Confirm Password wajib diisi");
          return false;
        }

        if (inputPassword !== inputConfirmPassword) {
          alert("Password dan Confirm Password tidak cocok");
          return false;
        }

        return true;
      }
      //submit form
      document
        .getElementById("SignUp")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          if (!validasiNama()) return;
          if (!validasiPassword()) return;
          alert("Pendaftaran berhasil!");
          document.getElementById("SignUp").reset();
          window.location.href = "signin.html";
        });
    </script>
  </body>
</html>
