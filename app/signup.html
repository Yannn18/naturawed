<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Naturawed</title>
    <link rel="stylesheet" href="editing.css" />
  </head>

  <body>
    <div class="container">
      <!-- LEFT SIDE -->
      <div class="left">
        <!-- Logo Image -- -->
        <img src="/naturawed/image/logo.svg" alt="logo" class="logo" />
        <h1>Naturawed</h1>
      </div>

      <!-- RIGHT SIDE -->
      <div class="right">
        <div class="form-box">
          <h2>Create Account</h2>

          <form id="SignUp">
            <div class="input-box">
              <label for="username">Username:</label>
              <input type="text" name="username" id="username" required />
            </div>

            <div class="input-box">
              <label for="email">Email:</label>
              <input type="email" name="email" id="email" required />
            </div>

            <div class="input-box">
              <label for="password">Password:</label>
              <input type="password" name="password" id="password" required />
            </div>

            <div class="input-box">
              <label for="confirmpassword">Confirm Password:</label>
              <input
                type="password"
                name="confirmpassword"
                id="confirmpassword"
                required
              />
            </div>

            <button type="submit">Sign Up</button>
          </form>
        </div>
      </div>
    </div>

    <script>
      //username validation
      function validasiNama() {
        let inputNama = document.getElementById("username").value;
        let pola = /^[a-zA-Z' ]+$/;

        if (!pola.test(inputNama)) {
          alert("Nama hanya boleh mengandung huruf dan tanda petik satu (')");
          return false;
        }
        return true;
      }

      //password validation (masih belum)
      function validasiPassword() {
        const inputPassword = document.getElementById("password").value;
        const inputConfirmPassword =
          document.getElementById("confirmpassword").value;

        if (!inputPassword || !inputConfirmPassword) {
          alert("Password dan Confirm Password wajib diisi");
          return false;
        }

        if (inputPassword !== inputConfirmPassword) {
          alert("Password dan Confirm Password tidak cocok");
          return false;
        }

        return true;
      }
      //submit form
      document
        .getElementById("SignUp")
        .addEventListener("submit", function (event) {
          event.preventDefault();
          if (!validasiNama()) return;
          if (!validasiPassword()) return;
          alert("Pendaftaran berhasil!");
          document.getElementById("SignUp").reset();
        });
    </script>
  </body>
</html>
