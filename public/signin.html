<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign In NaturaWed</title>

    <link rel="stylesheet" href="./css/editinglama.css" />
  </head>

  <body>
    <main class="container">
      <!-- LEFT SIDE -->
      <div class="left">
        <!-- Logo Image -- -->
        <img src="./image/logo.svg" alt="logo" class="logo" />
        <h1>Naturawed</h1>
      </div>
      <!-- RIGHT SIDE -->
      <div class="right">
        <div class="form-box">
          <div class="form-header">
            <h2>Sign In Account</h2>
            <p>Let's get started with your account.</p>
          </div>
          <div
            id="message"
            style="
              display: none;
              padding: 10px;
              margin-bottom: 10px;
              border-radius: 5px;
              text-align: center;
            "
          ></div>
          <div id="loading" style="display: none; text-align: center">
            Mohon tunggu...
          </div>
          <form id="SignIn">
            <div class="input-box">
              <input
                type="email"
                name="email"
                id="email"
                placeholder="Email"
                required
              />
            </div>

            <div class="input-box password-box">
              <input
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required
              />
              <span class="eye-icon">👁️</span>
            </div>

            <div
              style="
                margin: 10px 0;
                display: flex;
                align-items: center;
                gap: 5px;
              "
            >
              <input type="checkbox" id="remember" name="remember" />
              <label for="remember" style="font-size: 14px; color: #666"
                >Remember Me</label
              >
            </div>

            <button type="submit" class="btn-submit">Sign In</button>
          </form>
          <div class="login-link">
            <p>Don't have an account? <a href="signup.html">Sign Up</a></p>
          </div>
        </div>
      </div>
    </main>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const signinForm = document.getElementById("SignIn");

        if (signinForm) {
          signinForm.addEventListener("submit", async function (event) {
            event.preventDefault();

            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value.trim();
            const remember = document.getElementById("remember").checked
              ? "true"
              : "false";

            // Tombol loading
            const btn = document.querySelector(".btn-submit");
            btn.disabled = true;
            btn.innerText = "Processing...";

            try {
              const response = await fetch("signin.php", {
                method: "POST",
                headers: {
                  "Content-Type": "application/x-www-form-urlencoded",
                },
                body: new URLSearchParams({
                  email: email,
                  password: password,
                  remember: remember,
                }),
              });

              // AMBIL HASIL SEBAGAI TEXT DULU (Untuk jaga-jaga jika PHP error)
              const hasilMentah = await response.text();

              // COBA UBAH KE JSON
              const hasilJson = JSON.parse(hasilMentah);

              if (hasilJson.status === "success") {
                alert("Login Berhasil! Selamat datang " + hasilJson.username);
                window.location.href = "dashboard.php";
              } else {
                alert("Gagal: " + hasilJson.message);
                btn.disabled = false;
                btn.innerText = "Sign In";
              }
            } catch (error) {
              console.error("Detail Error:", error);
              alert(
                "Terjadi kesalahan sistem. Cek Console (F12) untuk detail.",
              );
              btn.disabled = false;
              btn.innerText = "Sign In";
            }
          });
        }
      });
    </script>
  </body>
</html>
