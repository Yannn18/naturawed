<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sign Up Naturawed</title>
    <link rel="stylesheet" href="./css/output.css" />
    <script src="https://unpkg.com/@tailwindcss/browser@4"></script>
  </head>

  <body
    class="bg-[#d1e2da] flex justify-center items-center min-h-screen overflow-x-hidden"
  >
    <main
      class="flex flex-col md:flex-row w-full max-w-[1100px] h-auto min-h-[600px] items-center justify-center p-8 gap-12 md:gap-[50px]"
    >
      <div
        class="flex-1 flex flex-col items-center justify-center text-center mb-5 md:mb-0"
      >
        <img src="./image/logo.svg" alt="logo" class="w-[200px] mb-5" />
        <h1
          class="text-[32px] md:text-[42px] font-bold text-[#0b452c] tracking-[1px]"
        >
          Naturawed
        </h1>
      </div>

      <div class="flex-1 flex justify-center w-full">
        <div
          class="bg-white p-10 rounded-[24px] w-full max-w-[450px] shadow-[0_10px_30px_rgba(0,0,0,0.05)]"
        >
          <div class="text-center mb-[30px]">
            <h2 class="text-[28px] font-semibold text-[#1a1a1a]">
              Create Account
            </h2>
            <p class="text-sm text-[#7a7a7a] mb-[30px]">
              Let's get started with a new account.
            </p>
          </div>

          <form class="flex flex-col gap-5" id="SignUp">
            <div class="w-full relative">
              <input
                class="w-full px-5 py-4 border border-[#e0e0e0] rounded-xl text-sm text-[#333] outline-none transition-colors duration-300 placeholder:text-[#a0a0a0] placeholder:font-medium focus:border-[#0b452c]"
                type="text"
                name="username"
                id="username"
                placeholder="User Name"
                required
              />
            </div>

            <div class="w-full relative">
              <input
                class="w-full px-5 py-4 border border-[#e0e0e0] rounded-xl text-sm text-[#333] outline-none transition-colors duration-300 placeholder:text-[#a0a0a0] placeholder:font-medium focus:border-[#0b452c]"
                type="email"
                name="email"
                id="email"
                placeholder="Email"
                required
              />
            </div>

            <div class="w-full relative">
              <input
                class="w-full px-5 py-4 border border-[#e0e0e0] rounded-xl text-sm text-[#333] outline-none transition-colors duration-300 placeholder:text-[#a0a0a0] placeholder:font-medium focus:border-[#0b452c]"
                type="password"
                name="password"
                id="password"
                placeholder="Password"
                required
              />
              <span
                class="absolute right-5 top-1/2 -translate-y-1/2 cursor-pointer text-[#a0a0a0] text-[18px]"
                >👁️</span
              >
            </div>

            <div class="w-full relative">
              <input
                class="w-full px-5 py-4 border border-[#e0e0e0] rounded-xl text-sm text-[#333] outline-none transition-colors duration-300 placeholder:text-[#a0a0a0] placeholder:font-medium focus:border-[#0b452c]"
                type="password"
                name="confirmpassword"
                id="confirmpassword"
                placeholder="Confirm Password"
                required
              />
              <span
                class="absolute right-5 top-1/2 -translate-y-1/2 cursor-pointer text-[#a0a0a0] text-[18px]"
                >👁️</span
              >
            </div>

            <button
              type="submit"
              id="btn-signup"
              class="w-full p-4 mt-2.5 border-none rounded-xl bg-[#06402b] text-white text-base font-semibold cursor-pointer transition-colors duration-300 hover:bg-[#042e1f]"
            >
              Sign Up
            </button>
          </form>

          <div class="mt-[30px] text-center text-sm text-[#7a7a7a]">
            <p>
              Already have an account?
              <a
                class="text-[#0b452c] font-semibold no-underline hover:underline"
                href="signin.html"
                >Log in</a
              >
            </p>
          </div>
        </div>
      </div>
    </main>

    <script>
      // 1. Validasi Nama
      function validasiNama() {
        let inputNama = document.getElementById("username").value;
        let pola = /^[a-zA-Z' ]+$/;

        if (!pola.test(inputNama)) {
          alert("Nama hanya boleh mengandung huruf dan tanda petik satu (')");
          return false;
        }
        return true;
      }

      // 2. Validasi Password
      function validasiPassword() {
        const inputPassword = document.getElementById("password").value;
        const inputConfirmPassword =
          document.getElementById("confirmpassword").value;

        if (inputPassword !== inputConfirmPassword) {
          alert("Password dan Confirm Password tidak cocok");
          return false;
        }

        return true;
      }

      // 3. Proses Submit ke PHP (Otomatis Session & Cookie)
      document
        .getElementById("SignUp")
        .addEventListener("submit", async function (event) {
          event.preventDefault();

          if (!validasiNama() || !validasiPassword()) return;

          const btn = document.getElementById("btn-signup");
          btn.disabled = true;
          btn.innerText = "Registering...";

          // Ambil data dari input
          const username = document.getElementById("username").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value.trim();

          try {
            const response = await fetch("signup.php", {
              method: "POST",
              headers: { "Content-Type": "application/x-www-form-urlencoded" },
              body: new URLSearchParams({
                username: username,
                email: email,
                password: password,
              }),
            });

            const hasil = await response.json();

            if (hasil.status === "success") {
              alert("Pendaftaran Berhasil! Selamat datang, " + hasil.username);
              // Langsung pindah ke Dashboard (Session sudah diset di PHP)
              window.location.href = "signin.html";
            } else {
              alert("Gagal: " + hasil.message);
              btn.disabled = false;
              btn.innerText = "Sign Up";
            }
          } catch (error) {
            console.error("Error detail:", error);
            alert("Gagal menghubungi server. Pastikan Apache jalan!");
            btn.disabled = false;
            btn.innerText = "Sign Up";
          }
        });
    </script>
  </body>
</html>
